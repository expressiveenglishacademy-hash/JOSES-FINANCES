<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finance App Modern</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
*{box-sizing:border-box;}
body{margin:0;font-family:Arial;background:#0f172a;color:#fff;}

/* TOP NAV */
.topbar{
 display:flex;
 justify-content:space-between;
 align-items:center;
 padding:15px 25px;
 background:#020617;
}

.topbar h1{color:#38bdf8;margin:0;font-size:20px;}

.container{padding:20px;}

/* GRID DASHBOARD */
.grid{
 display:grid;
 grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
 gap:20px;
}

.card{
 background:#1e293b;
 padding:20px;
 border-radius:15px;
 box-shadow:0 4px 15px rgba(0,0,0,0.4);
}

.card h3{margin-top:0;color:#38bdf8;}

input,select,button{
 width:100%;
 padding:10px;
 margin-top:8px;
 border-radius:8px;
 border:none;
}

button{
 background:#38bdf8;
 color:#000;
 font-weight:bold;
 cursor:pointer;
}

/* STATS */
.stats{
 display:grid;
 grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
 gap:15px;
 margin-bottom:20px;
}

.stat{
 background:#1e293b;
 padding:15px;
 border-radius:12px;
 text-align:center;
}

/* MOBILE */
@media(max-width:600px){
 .topbar{flex-direction:column;gap:10px;}
}
</style>
</head>
<body>

<div id="login" style="display:flex;justify-content:center;align-items:center;height:100vh;">
<div class="card" style="width:300px;">
<h3>Enter PIN</h3>
<input type="password" id="pin">
<button onclick="loginUser()">Login</button>
</div>
</div>

<div id="app" style="display:none;">

<div class="topbar">
<h1>💰 My Finance</h1>
</div>

<div class="container">

<!-- STATS -->
<div class="stats">
<div class="stat"><h4>Income</h4><p id="inc"></p></div>
<div class="stat"><h4>Expenses</h4><p id="exp"></p></div>
<div class="stat"><h4>Savings</h4><p id="sav"></p></div>
</div>

<!-- GRID -->
<div class="grid">

<div class="card">
<h3>Add Income</h3>
<input id="incomeName" placeholder="Source">
<input id="incomeAmount" type="number">
<button onclick="addIncome()">Add</button>
</div>

<div class="card">
<h3>Add Expense</h3>
<input id="expenseName" placeholder="Name">
<select id="expenseCategory">
<option>Home & Food</option>
<option>Family</option>
<option>Personal</option>
<option>Other</option>
</select>
<input id="expenseAmount" type="number">
<button onclick="addExpense()">Add</button>
</div>

<div class="card">
<h3>Chart</h3>
<canvas id="chart"></canvas>
</div>

<div class="card">
<h3>Goals</h3>
<input id="goalName" placeholder="Goal">
<input id="goalAmount" type="number">
<button onclick="addGoal()">Add</button>
<ul id="goals"></ul>
</div>

</div>

</div>
</div>

<script>
let data=JSON.parse(localStorage.getItem('financeData'))||{pin:null,incomes:[],expenses:[],goals:[]};
let chart;

function save(){localStorage.setItem('financeData',JSON.stringify(data));}

function loginUser(){
let p=document.getElementById('pin').value;
if(!data.pin){data.pin=p;save();}
if(p===data.pin){
 document.getElementById('login').style.display='none';
 document.getElementById('app').style.display='block';
 render();
}else alert('Wrong PIN');
}

function addIncome(){
let n=incomeName.value;
let a=+incomeAmount.value;
if(!n||!a)return;
data.incomes.push({n,a});
save();render();
}

function addExpense(){
let n=expenseName.value;
let c=expenseCategory.value;
let a=+expenseAmount.value;
if(!n||!a)return;
data.expenses.push({n,c,a});
save();render();
}

function addGoal(){
let n=goalName.value;
let a=+goalAmount.value;
if(!n||!a)return;
data.goals.push({n,a});
save();render();
}

function render(){
let inc=data.incomes.reduce((s,i)=>s+i.a,0);
let exp=data.expenses.reduce((s,e)=>s+e.a,0);
let sav=inc-exp;

incEl=document.getElementById('inc');
expEl=document.getElementById('exp');
savEl=document.getElementById('sav');

incEl.innerText='$'+inc;
expEl.innerText='$'+exp;
savEl.innerText='$'+sav;

if(chart) chart.destroy();
chart=new Chart(document.getElementById('chart'),{
type:'pie',
data:{labels:data.expenses.map(e=>e.c),datasets:[{data:data.expenses.map(e=>e.a)}]}
});

let goalsHTML=data.goals.map(g=>`<li>${g.n}: $${g.a}</li>`).join('');
document.getElementById('goals').innerHTML=goalsHTML;
}
</script>

</body>
</html>
